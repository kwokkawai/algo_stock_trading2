broker:
  host: 127.0.0.1
  port: 11111
  security_firm: FUTUSECURITIES

trading:
  env: simulate
  paper_only: true   # HARD LOCK: all orders use Futu simulate account until set false
  markets:
    - HK
    - US

risk:
  max_notional_per_order: 100000
  max_position_pct: 0.2
  daily_loss_limit: 10000
  signal_cooldown_seconds: 60
  tick_max_orders_per_minute: 10
  # Must include every symbol from config/strategies/*.yaml → symbols
  # Futu format: HK.00700 (5 digits), US.AAPL — see docs/WATCHLIST.md
  allowed_symbols:
    HK:
      - HK.00700    # 腾讯
      - HK.09988    # 阿里巴巴-SW
      - HK.02318    # 中国平安
      - HK.03690    # 美团-W
      - HK.00005    # 汇丰（示例，可按需删除）
    US:
      - US.AAPL
      - US.MSFT
      - US.TSLA     # 示例

logging:
  level: INFO
